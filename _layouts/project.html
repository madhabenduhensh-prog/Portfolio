---
layout: default
---
<h1>{{ page.title }}</h1>

<p>{{ page.date | date: "%Y" }}</p>

{{ content }}

<div>
  {% for photo in page.photos %}
  <p>
    <img src="{{ site.baseurl }}/assets/projects/{{ page.slug }}/{{ photo }}"
         alt="{{ page.title }} - image {{ forloop.index }}"
         width="100%">
  </p>
  {% endfor %}
</div>
